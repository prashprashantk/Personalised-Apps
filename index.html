<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Health">
<meta name="theme-color" content="#070810">
<title>Prash Health Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #070810;
  --card: #141622;
  --g: #4ade80; /* Green - Must Do */
  --b: #38bdf8; /* Blue - Optional/Backup */
  --o: #f59e0b; /* Orange - Timing */
  --r: #ef4444; /* Red - Overdue */
  --t: #e2e8f0;
  --t2: #94a3b8;
  --t3: #4a5270;
  --bdr: #1e2235;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--t); user-select: none; }
#app { padding-top: var(--safe-top); padding-bottom: calc(70px + var(--safe-bot)); min-height: 100vh; }

/* Header */
.hdr { position: sticky; top: 0; z-index: 50; background: var(--bg); padding: 16px 16px 8px; border-bottom: 1px solid var(--bdr); }
.hdr-top { display:flex; justify-content:space-between; align-items:center; }
.hdr-pct { font-size:24px; font-weight:800; color:var(--g); }
.prog-bar { height:4px; background:var(--card); border-radius:2px; margin-top:8px; overflow:hidden; }
.prog-fill { height:100%; background:var(--g); transition:width 0.4s ease; }

/* Task Styling */
.task { display:flex; gap:12px; padding:12px 16px; border-bottom:1px solid #111420; cursor:pointer; align-items: flex-start; }
.task.done { opacity:0.3; }
.chk { width:24px; height:24px; border-radius:50%; border:2px solid var(--t3); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:12px; margin-top:2px; }
.task.done .chk { border-color:var(--g); background:var(--g); color:var(--bg); }
.task-body { flex:1; }
.task-meta { display:flex; gap:6px; margin-bottom:4px; align-items:center; }
.time-tag { font-family:'JetBrains Mono'; font-size:10px; color:var(--o); font-weight:700; }
.priority-tag { font-size:9px; padding:2px 6px; border-radius:4px; font-weight:800; text-transform:uppercase; letter-spacing:0.5px; }
.must { background: #4ade8020; color: var(--g); }
.opt { background: #38bdf820; color: var(--b); }
.task-title { font-size:15px; font-weight:600; line-height:1.2; }
.task-sub { font-size:11px; color:var(--t2); margin-top:3px; }

/* Nav */
.bnav { position:fixed; bottom:0; width:100%; background:var(--bg); border-top:1px solid var(--bdr); display:flex; padding-bottom:var(--safe-bot); }
.bnav-btn { flex:1; padding:12px; border:none; background:none; color:var(--t3); font-size:10px; font-weight:700; text-align:center; }
.bnav-btn.act { color:var(--g); }
.view { display:none; }
.view.act { display:block; }

.water-grid { display:grid; grid-template-columns: repeat(3,1fr); gap:8px; padding:16px; }
.bottle { background:var(--card); padding:15px; border-radius:12px; text-align:center; border:1px solid var(--bdr); }
.bottle.done { border-color:var(--b); background:#38bdf810; }
</style>
</head>
<body>

<div id="app">
  <div class="hdr">
    <div class="hdr-top">
      <div>
        <div id="day-label" style="font-size:10px; color:var(--t2); text-transform:uppercase; letter-spacing:1px;"></div>
        <div class="hdr-pct" id="pct-label">0%</div>
      </div>
      <div style="text-align:right">
         <div id="task-count" style="font-size:12px; font-weight:700;">0/0</div>
         <div style="font-size:8px; color:var(--t2);">COMPLETED</div>
      </div>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <div id="today-view" class="view act"></div>
  
  <div id="water-view" class="view">
    <div class="water-grid" id="water-grid"></div>
  </div>
</div>

<nav class="bnav">
  <button class="bnav-btn act" onclick="switchView('today')">ROUTINE</button>
  <button class="bnav-btn" onclick="switchView('water')">WATER</button>
</nav>

<script>
const state = JSON.parse(localStorage.getItem('prash_health_v2')) || { completed: {}, water: {} };
const now = new Date();
const isWeekend = now.getDay() === 5 || now.getDay() === 6; // Fri-Sat

const routine = [
  { id: 'supp1', time: isWeekend ? "09:00" : "06:50", title: "Glutathione + Ashwagandha", sub: "Empty stomach. Cool water only.", priority: "must", cat: "supp" },
  { id: 'skin1', time: isWeekend ? "09:15" : "06:55", title: "Face Wash + Sunscreen", sub: "Basic AM protection.", priority: "must", cat: "skin" },
  { id: 'food1', time: isWeekend ? "10:00" : "07:15", title: "Breakfast + Fish Oil + Collagen", sub: "Needs fats to absorb. No hot water for collagen.", priority: "must", cat: "food" },
  { id: 'supp2', time: "13:30", title: "Magnesium+", sub: "Post-lunch focus and muscle support.", priority: "opt", cat: "supp" },
  { id: 'workout', time: "19:00", title: "Bodyweight Session", sub: "Only 4x/week. Electrolytes during.", priority: "opt", cat: "workout" },
  { id: 'food2', time: "20:30", title: "Dinner", sub: "High protein. Finish by 21:30.", priority: "must", cat: "food" },
  { id: 'skin2', time: "22:30", title: "Night Skin Wash", sub: "Crucial to clear Riyadh dust/sunscreen.", priority: "must", cat: "skin" }
];

function save() { localStorage.setItem('prash_health_v2', JSON.stringify(state)); }

function render() {
  const todayDiv = document.getElementById('today-view');
  todayDiv.innerHTML = routine.map(item => {
    const isDone = state.completed[item.id];
    return `
      <div class="task ${isDone ? 'done' : ''}" onclick="toggle('${item.id}')">
        <div class="chk">${isDone ? '✓' : ''}</div>
        <div class="task-body">
          <div class="task-meta">
            <span class="time-tag">${item.time}</span>
            <span class="priority-tag ${item.priority}">${item.priority}</span>
          </div>
          <div class="task-title">${item.title}</div>
          <div class="task-sub">${item.sub}</div>
        </div>
      </div>
    `;
  }).join('');

  const doneCount = Object.values(state.completed).filter(Boolean).length;
  const pct = Math.round((doneCount / routine.length) * 100);
  document.getElementById('pct-label').textContent = pct + "%";
  document.getElementById('prog-fill').style.width = pct + "%";
  document.getElementById('task-count').textContent = `${doneCount}/${routine.length}`;
  document.getElementById('day-label').textContent = isWeekend ? "Weekend Mode" : "Workday Mode";
}

function toggle(id) {
  state.completed[id] = !state.completed[id];
  save();
  render();
}

function switchView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('act'));
  document.querySelectorAll('.bnav-btn').forEach(el => el.classList.remove('act'));
  document.getElementById(v + '-view').classList.add('act');
  event.target.classList.add('act');
}

render();
</script>
</body>
</html>
